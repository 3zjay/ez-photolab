<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="60%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#050508" />
    </radialGradient>
    
    <!-- Premium Neon Logo Glow -->
    <linearGradient id="logoGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#6c63ff" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Subtle Drop Shadow for 3D realism -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6c63ff" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background rounded box -->
  <rect width="512" height="512" rx="112" fill="url(#bgGlow)" />

  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="160" stroke="url(#logoGlow)" stroke-width="12" fill="none" filter="url(#shadow)" opacity="0.9" />

  <!-- Camera Aperture Blades -->
  <g stroke="url(#logoGlow)" stroke-width="8" stroke-linecap="round" filter="url(#shadow)">
    <!-- Blade 1 -->
    <path d="M293.4 192 L385.2 351.0" opacity="0.95" />
    <!-- Blade 2 -->
    <path d="M219.0 192 L402.7 192.0" opacity="0.95" />
    <!-- Blade 3 -->
    <path d="M182.0 256 L273.8 97.0" opacity="0.95" />
    <!-- Blade 4 -->
    <path d="M219.0 320 L127.2 161.0" opacity="0.95" />
    <!-- Blade 5 -->
    <path d="M293.4 320 L109.7 320.0" opacity="0.95" />
    <!-- Blade 6 -->
    <path d="M330.4 256 L238.6 415.0" opacity="0.95" />
  </g>

  <!-- Inner Shutter Details -->
  <circle cx="256" cy="256" r="64" stroke="url(#logoGlow)" stroke-width="4" fill="none" opacity="0.4" style="mix-blend-mode: overlay;" />
  <circle cx="256" cy="256" r="32" fill="url(#logoGlow)" opacity="0.15" />
</svg>
